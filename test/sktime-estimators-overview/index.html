<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

  th, td {
      border: 1px solid black;
      padding: 8px;
      text-align: left;
  }
</style>
</head>


<body>
<!-- Dropdown menu for options -->
<select id="options" onchange="filterTable()">
  <option value="all">ALL</option>
  <option value="forecaster">Forecaster</option>
  <option value="transformer">Transformer</option>
  <option value="regressor">Regressor</option>
  <option value="aligner">Aligner</option>
  <option value="clusterer">Clusterer</option>
  <option value="classifier">Classifier</option>
</select>
<table id="jsonTable"></table>
<div id="pagination"></div>

<script>
filterTable()
function fetchAndRenderTable(header) {
    fetch('estimator_overview_db.json') 
      .then(response => response.json())
      .then(data => {
        renderTable (data, header)
        // Store data in sessionStorage
        sessionStorage.setItem('jsonData', JSON.stringify(data));
      })
      .catch(error => console.error('Error:', error));
}

function renderTable(data, header, page = 1, pageSize = 10) {
    const table = document.getElementById('jsonTable');
    const pagination = document.getElementById('pagination');
    
    // Clear table and pagination content
    table.innerHTML = '';
    pagination.innerHTML = '';

    // Calculate pagination indexes
    const startIndex = (page - 1) * pageSize;
    const endIndex = Math.min(startIndex + pageSize, data.length);

    // Table header
    let headerRow = '<tr>';
    header.forEach(headerItem => {
        headerRow += `<th>${headerItem}</th>`;
    });
    headerRow += '</tr>';
    table.innerHTML += headerRow;
    
    // Table rows
    for (let i = startIndex; i < endIndex; i++) {
        let rowContent = '<tr>';
        header.forEach(headerItem => {
          rowContent += `<td>${data[i][headerItem]}</td>`;
        });
        rowContent += '</tr>';
        table.innerHTML += rowContent;
    }

    // Pagination buttons
    const totalPages = Math.ceil(data.length / pageSize);
    for (let i = 1; i <= totalPages; i++) {
        const button = document.createElement('button');
        button.innerText = i;
        button.addEventListener('click', () => renderTable(data, header, i, pageSize));
        pagination.appendChild(button);
    }
}

function filterTable() {
    const selectedOption = document.getElementById('options').value;
    let header, filterKey;

    switch(selectedOption) {
        case 'forecaster':
            header = ["Class Name", "Estimator Type", "Maintainers", "Dependencies"];
            filterKey = "Estimator Type";
            break;
        case 'transformer':
            header = ["Class Name", "Estimator Type", "Maintainers", "Dependencies"];
            filterKey = "Estimator Type";
            break;
        case 'regressor':
            header = ["Class Name", "Estimator Type", "Maintainers", "Dependencies"];
            filterKey = "Estimator Type";
            break;
        case 'aligner':
            header = ["Class Name", "Estimator Type", "Maintainers", "Dependencies"];
            filterKey = "Estimator Type";
            break;
        case 'clusterer':
            header = ["Class Name", "Estimator Type", "Maintainers", "Dependencies"];
            filterKey = "Estimator Type";
            break;
        case 'classifier':
            header = ["Class Name", "Estimator Type", "Maintainers", "Dependencies"];
            filterKey = "Estimator Type";
            break;
        default:
            header = ["Class Name", "Estimator Type", "Maintainers", "Dependencies"];
            filterKey = null;
    }

    const cachedData = sessionStorage.getItem('jsonData');
    if (cachedData) {
        const data = JSON.parse(cachedData);
        if (filterKey) {
            const filteredData = data.filter(row => row[filterKey] === selectedOption);
            renderTable(filteredData, header); 
        } else {
            renderTable(data, header);
        }
    } else {
        fetchAndRenderTable(header);
    }
}
</script>



</script>
</body>
</html>
